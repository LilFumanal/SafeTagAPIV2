spring:
  application:
    name: SafeTagAPIV2
  datasource:
    url: jdbc:postgresql://localhost:5433/safetag_rpps
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
        generate_statistics: false
  codec:
    max-in-memory-size: -1

rpps:
  baseUrl: https://gateway.api.esante.gouv.fr/fhir/v2
  apiKey: e360cdfc-f361-4b9e-94da-94e51075cae6
  source:
    csvUrl: https://www.data.gouv.fr/api/1/datasets/r/fffda7e9-0ea2-4c35-bba0-4496f3af935d
    timeout-minutes: 10
  import:
    limit: 100

server:
  port: 8081

resilience4j:
  circuitbreaker:
    instances:
      rppsApi:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        recordExceptions:
          - com.lil.safetag.exception.RppsExceptions$CommunicationException
          - com.lil.safetag.exception.RppsExceptions$BaseException
        ignoreExceptions:
          - com.lil.safetag.exception.RppsExceptions$NotFoundException

  retry:
    instances:
      rppsApi:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - com.lil.safetag.exception.RppsExceptions$CommunicationException
          - com.lil.safetag.exception.RppsExceptions$BaseException
        ignoreExceptions:
          - com.lil.safetag.exception.RppsExceptions$NotFoundException
